<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="layout1">

<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
    <div class="p-3" layout:fragment="content1">
       <form method="post" th:action="@{/saveProduct}">
           <div class="mb-3">
               <label class="form-label">Name
                   <input class="form-control" type="text" name="name" th:value="${product.name}"/>
               </label>
               <span th:errors="${product.name}"></span>
           </div>
           <div class="mb-3">
               <label class="form-label">Price
                   <input class="form-control" type="number" name="price" th:value="${product.price}"/>
               </label>
               <span th:errors="${product.price}"></span>
           </div>
           <div class="mb-3">
               <label class="form-label">Quantity
                   <input class="form-control" type="number" name="quantity" th:value="${product.quantity}"/>
               </label>
               <span th:errors="${product.quantity}"></span>
           </div>
           <button type="submit" class="btn btn-primary">Save</button>
       </form>
    </div>
</body>
</html>
